<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Μετράω τις μέρες</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0c1a;
    --surface: #1a1528;
    --border: #2e2542;
    --accent: #c084fc;
    --accent2: #f0abfc;
    --text: #f3e8ff;
    --muted: #9d8cb0;
    --crossed: #3b2f5c;
    --glow: rgba(192, 132, 252, 0.18);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 4rem;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(120, 40, 200, 0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(192, 132, 252, 0.08) 0%, transparent 50%);
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
    animation: fadeDown 0.8s ease both;
  }

  header .eyebrow {
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.5rem;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(1.6rem, 5vw, 2.4rem);
    color: var(--text);
    line-height: 1.2;
  }

  header p {
    font-size: 0.82rem;
    color: var(--muted);
    margin-top: 0.5rem;
  }

  /* --- SETUP PANEL --- */
  #setup-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.8rem;
    width: 100%;
    max-width: 420px;
    margin-bottom: 2.5rem;
    animation: fadeDown 0.9s ease both;
  }

  #setup-panel label {
    display: block;
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.4rem;
  }

  #setup-panel input[type="date"],
  #setup-panel input[type="text"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Lato', sans-serif;
    font-size: 0.9rem;
    padding: 0.55rem 0.8rem;
    margin-bottom: 1.2rem;
    outline: none;
    transition: border-color 0.2s;
  }

  #setup-panel input:focus {
    border-color: var(--accent);
  }

  #setup-panel input[type="date"]::-webkit-calendar-picker-indicator {
    filter: invert(0.6);
  }

  #setup-panel button {
    width: 100%;
    background: linear-gradient(135deg, #7c3aed, #c084fc);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-family: 'Lato', sans-serif;
    font-size: 0.88rem;
    letter-spacing: 0.08em;
    padding: 0.7rem;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }

  #setup-panel button:hover { opacity: 0.88; }
  #setup-panel button:active { transform: scale(0.98); }

  /* --- STATS STRIP --- */
  #stats-strip {
    display: flex;
    gap: 1rem;
    width: 100%;
    max-width: 640px;
    margin-bottom: 2rem;
    animation: fadeDown 1s ease both;
  }

  .stat-card {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem 0.8rem;
    text-align: center;
  }

  .stat-card .num {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.5rem, 4vw, 2.2rem);
    color: var(--accent);
    line-height: 1;
  }

  .stat-card .lbl {
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 0.3rem;
  }

  /* --- NEXT DATE BANNER --- */
  #next-banner {
    width: 100%;
    max-width: 640px;
    background: linear-gradient(135deg, rgba(124,58,237,0.25), rgba(192,132,252,0.12));
    border: 1px solid rgba(192,132,252,0.3);
    border-radius: 12px;
    padding: 1rem 1.4rem;
    display: flex;
    align-items: center;
    gap: 0.8rem;
    margin-bottom: 2rem;
    animation: fadeDown 1.05s ease both;
  }

  #next-banner .icon { font-size: 1.5rem; }

  #next-banner .info { flex: 1; }
  #next-banner .info .top {
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  #next-banner .info .bot {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: var(--accent2);
  }

  /* --- MONTH NAVIGATION --- */
  #month-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    max-width: 640px;
    margin-bottom: 1rem;
    animation: fadeDown 1.1s ease both;
  }

  #month-nav button {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-size: 1rem;
    padding: 0.4rem 0.9rem;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
  }

  #month-nav button:hover { color: var(--accent); border-color: var(--accent); }

  #month-nav h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    letter-spacing: 0.04em;
  }

  /* --- CALENDAR GRID --- */
  #calendar-wrap {
    width: 100%;
    max-width: 640px;
    animation: fadeDown 1.15s ease both;
  }

  .weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 4px;
  }

  .weekdays span {
    text-align: center;
    font-size: 0.62rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0.3rem 0;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }

  .day-cell {
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    font-size: clamp(0.75rem, 2vw, 0.9rem);
    cursor: pointer;
    position: relative;
    transition: border-color 0.15s, background 0.15s;
    user-select: none;
  }

  .day-cell:hover:not(.empty):not(.future-lock) {
    border-color: var(--accent);
  }

  .day-cell.empty {
    background: transparent;
    border-color: transparent;
    cursor: default;
  }

  .day-cell.today {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent), 0 0 10px var(--glow);
    color: var(--accent);
    font-weight: 700;
  }

  .day-cell.crossed {
    background: var(--crossed);
    border-color: var(--crossed);
    color: #6b5a8a;
  }

  .day-cell.crossed::after {
    content: '✕';
    position: absolute;
    font-size: 1.1em;
    color: rgba(192,132,252,0.35);
    pointer-events: none;
  }

  .day-cell.reunion {
    background: linear-gradient(135deg, rgba(124,58,237,0.4), rgba(192,132,252,0.2));
    border-color: var(--accent2);
    color: var(--accent2);
    box-shadow: 0 0 12px rgba(240,171,252,0.3);
    font-weight: 700;
  }

  .day-cell.reunion::before {
    content: '♡';
    position: absolute;
    top: 2px;
    font-size: 0.55em;
    color: var(--accent2);
  }

  .day-cell.future-lock {
    cursor: default;
    opacity: 0.45;
  }

  /* --- RESET --- */
  #reset-btn {
    margin-top: 2.5rem;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'Lato', sans-serif;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.5rem 1.2rem;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
  }
  #reset-btn:hover { color: #e879f9; border-color: #e879f9; }

  /* --- ANIMATIONS --- */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes pop {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.18); }
    100% { transform: scale(1); }
  }

  .pop-anim { animation: pop 0.3s ease; }
</style>
</head>
<body>

<header>
  <div class="eyebrow">ημερολόγιο αναμονής</div>
  <h1 id="header-title">Μετράω τις μέρες<br>για σένα</h1>
  <p id="header-sub">Σταυρώνεις κάθε μέρα που περνάει — μέχρι να ξανασμιχθείτε.</p>
</header>

<!-- SETUP -->
<div id="setup-panel">
  <label>Ονομα του αγαπημένου σου 💜</label>
  <input type="text" id="input-name" placeholder="π.χ. Νικόλας" maxlength="30" />

  <label>Ημερομηνία επανένωσης 🗓</label>
  <input type="date" id="input-date" />

  <button id="save-btn">Ξεκίνα να μετράς</button>
</div>

<!-- STATS -->
<div id="stats-strip" style="display:none">
  <div class="stat-card">
    <div class="num" id="stat-crossed">0</div>
    <div class="lbl">μέρες πέρασαν</div>
  </div>
  <div class="stat-card">
    <div class="num" id="stat-remain">—</div>
    <div class="lbl">μέρες μένουν</div>
  </div>
  <div class="stat-card">
    <div class="num" id="stat-total">—</div>
    <div class="lbl">συνολικά</div>
  </div>
</div>

<!-- NEXT BANNER -->
<div id="next-banner" style="display:none">
  <div class="icon">✈️</div>
  <div class="info">
    <div class="top">Επανένωση με τον <span id="banner-name">—</span></div>
    <div class="bot" id="banner-date">—</div>
  </div>
</div>

<!-- MONTH NAV -->
<div id="month-nav" style="display:none">
  <button id="prev-month">‹</button>
  <h2 id="month-label">—</h2>
  <button id="next-month">›</button>
</div>

<!-- CALENDAR -->
<div id="calendar-wrap" style="display:none">
  <div class="weekdays">
    <span>Δε</span><span>Τρ</span><span>Τε</span><span>Πε</span><span>Πα</span><span>Σα</span><span>Κυ</span>
  </div>
  <div class="grid" id="cal-grid"></div>
</div>

<button id="reset-btn" style="display:none">↺ Αλλαγή ρυθμίσεων</button>

<script>
const STORAGE_KEY = 'eva_countdown_v2';

let state = {
  name: '',
  reunionDate: '',   // YYYY-MM-DD
  crossedDays: [],   // ['YYYY-MM-DD', ...]
  viewYear: null,
  viewMonth: null,
};

// ---------- persistence ----------
function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) state = { ...state, ...JSON.parse(raw) };
  } catch (_) {}
}

// ---------- helpers ----------
function todayStr() {
  const d = new Date();
  return ymd(d.getFullYear(), d.getMonth() + 1, d.getDate());
}
function ymd(y, m, d) {
  return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}
function parseDate(s) {
  const [y, m, d] = s.split('-').map(Number);
  return new Date(y, m - 1, d);
}
function diffDays(a, b) {
  return Math.round((parseDate(b) - parseDate(a)) / 86400000);
}
const MONTHS_EL = ['Ιανουάριος','Φεβρουάριος','Μάρτιος','Απρίλιος','Μάιος','Ιούνιος',
                   'Ιούλιος','Αύγουστος','Σεπτέμβριος','Οκτώβριος','Νοέμβριος','Δεκέμβριος'];

// ---------- render ----------
function renderCalendar() {
  const { viewYear: y, viewMonth: m, reunionDate, crossedDays } = state;
  const today = todayStr();
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  // first weekday of month (0=Sun…6=Sat → convert to Mon-first: 0=Mon…6=Sun)
  const firstDay = new Date(y, m - 1, 1).getDay(); // 0=Sun
  const offset = (firstDay + 6) % 7; // Mon-first offset
  const daysInMonth = new Date(y, m, 0).getDate();

  document.getElementById('month-label').textContent = `${MONTHS_EL[m-1]} ${y}`;

  for (let i = 0; i < offset; i++) {
    const empty = document.createElement('div');
    empty.className = 'day-cell empty';
    grid.appendChild(empty);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const ds = ymd(y, m, d);
    const cell = document.createElement('div');
    cell.className = 'day-cell';
    cell.textContent = d;

    if (ds === today) cell.classList.add('today');
    if (ds === reunionDate) cell.classList.add('reunion');
    if (crossedDays.includes(ds)) cell.classList.add('crossed');
    if (ds > today) cell.classList.add('future-lock');

    if (ds <= today && ds !== reunionDate) {
      cell.addEventListener('click', () => toggleCross(ds, cell));
    }

    grid.appendChild(cell);
  }

  updateStats();
}

function toggleCross(ds, cell) {
  const idx = state.crossedDays.indexOf(ds);
  if (idx === -1) {
    state.crossedDays.push(ds);
    cell.classList.add('crossed', 'pop-anim');
    setTimeout(() => cell.classList.remove('pop-anim'), 350);
  } else {
    state.crossedDays.splice(idx, 1);
    cell.classList.remove('crossed');
  }
  save();
  updateStats();
}

function updateStats() {
  const today = todayStr();
  const crossed = state.crossedDays.filter(d => d <= today).length;
  const remain = state.reunionDate ? Math.max(0, diffDays(today, state.reunionDate)) : '—';
  const total  = state.reunionDate ? diffDays(todayStr(), state.reunionDate) + crossed : '—';

  document.getElementById('stat-crossed').textContent = crossed;
  document.getElementById('stat-remain').textContent  = remain === 0 ? '🎉' : remain;
  document.getElementById('stat-total').textContent   = typeof total === 'number' ? total : '—';
}

function updateBanner() {
  const name = state.name || 'αγαπημένο';
  document.getElementById('banner-name').textContent = name;
  document.getElementById('header-title').innerHTML  = `Μετράω τις μέρες<br>για τον ${name}`;

  if (state.reunionDate) {
    const d = parseDate(state.reunionDate);
    const opts = { weekday:'long', day:'numeric', month:'long', year:'numeric' };
    document.getElementById('banner-date').textContent =
      d.toLocaleDateString('el-GR', opts);
  }
}

function showApp() {
  document.getElementById('setup-panel').style.display  = 'none';
  document.getElementById('stats-strip').style.display  = 'flex';
  document.getElementById('next-banner').style.display  = 'flex';
  document.getElementById('month-nav').style.display    = 'flex';
  document.getElementById('calendar-wrap').style.display = 'block';
  document.getElementById('reset-btn').style.display    = 'block';
  updateBanner();
  renderCalendar();
}

// ---------- month nav ----------
document.getElementById('prev-month').addEventListener('click', () => {
  state.viewMonth--;
  if (state.viewMonth < 1) { state.viewMonth = 12; state.viewYear--; }
  renderCalendar();
});
document.getElementById('next-month').addEventListener('click', () => {
  state.viewMonth++;
  if (state.viewMonth > 12) { state.viewMonth = 1; state.viewYear++; }
  renderCalendar();
});

// ---------- save btn ----------
document.getElementById('save-btn').addEventListener('click', () => {
  const name = document.getElementById('input-name').value.trim();
  const date = document.getElementById('input-date').value;
  if (!date) { alert('Βάλε μια ημερομηνία αγάπη μου 💜'); return; }
  state.name = name || 'Νικόλας';
  state.reunionDate = date;
  const d = parseDate(date);
  state.viewYear  = d.getFullYear();
  state.viewMonth = d.getMonth() + 1;
  save();
  showApp();
});

// ---------- reset ----------
document.getElementById('reset-btn').addEventListener('click', () => {
  if (!confirm('Σίγουρα θες αλλαγή; Θα χαθούν τα σταυρωμένα... 🥺')) return;
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
});

// ---------- init ----------
load();
if (state.reunionDate) {
  // pre-fill if saved but setup hidden
  if (!state.viewYear) {
    const d = parseDate(state.reunionDate);
    state.viewYear  = d.getFullYear();
    state.viewMonth = d.getMonth() + 1;
  }
  showApp();
} else {
  // set min date for input
  document.getElementById('input-date').min = todayStr();
}
</script>
</body>
</html>
